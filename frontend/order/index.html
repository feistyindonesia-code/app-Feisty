<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order - Feisty</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../config.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            feisty: '#fc7303',
            'feisty-dark': '#e65a00',
          }
        }
      }
    }
  </script>
  <style>
    .product-card { transition: transform 0.2s; }
    .product-card:hover { transform: translateY(-2px); }
    .category-btn.active { background-color: #fc7303; color: white; }
  </style>
</head>
<body class="bg-gray-50">
  <!-- Header -->
  <header class="bg-white shadow-md sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <span class="text-2xl">🔥</span>
        <span class="text-xl font-bold text-feisty">Feisty</span>
      </div>
      <button onclick="toggleCart()" class="relative p-2">
        <span class="text-xl">🛒</span>
        <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">0</span>
      </button>
    </div>
  </header>

  <!-- Location Banner -->
  <div id="location-banner" class="bg-feisty text-white px-4 py-2 text-center text-sm flex items-center justify-center gap-2">
    <span id="location-text">📍 Mengeteksi lokasi Anda...</span>
    <button onclick="showOutletSelector()" class="underline font-medium">Ubah</button>
  </div>

  <!-- Outlet Selector Modal -->
  <div id="outlet-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-lg w-full max-w-md max-h-[80vh] overflow-y-auto">
      <div class="p-4 border-b flex justify-between items-center">
        <h2 class="text-xl font-bold">Pilih Outlet</h2>
        <button onclick="closeOutletModal()" class="text-gray-500 text-2xl">&times;</button>
      </div>
      <div id="outlet-list" class="p-4 space-y-2">
        <!-- Outlet options will be loaded here -->
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 py-4">
    <!-- Categories -->
    <div class="mb-4 overflow-x-auto">
      <div id="categories" class="flex gap-2 pb-2">
        <button onclick="filterCategory('all')" class="category-btn active px-4 py-2 rounded-full bg-gray-200 whitespace-nowrap text-sm font-medium">
          Semua
        </button>
      </div>
    </div>

    <!-- Products Grid -->
    <div id="products" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-20">
      <div class="col-span-full text-center py-8 text-gray-500">Memuat menu...</div>
    </div>
  </main>

  <!-- Cart Sidebar -->
  <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full md:w-96 bg-white shadow-xl transform translate-x-full transition-transform z-50">
    <div class="flex flex-col h-full">
      <div class="p-4 border-b flex justify-between items-center">
        <h2 class="text-xl font-bold">Keranjang</h2>
        <button onclick="toggleCart()" class="text-gray-500 text-2xl">&times;</button>
      </div>
      
      <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3">
        <p class="text-gray-500 text-center">Keranjang kosong</p>
      </div>

      <div id="cart-summary" class="border-t p-4 hidden">
        <div class="flex justify-between mb-2">
          <span>Subtotal</span>
          <span id="cart-subtotal">Rp 0</span>
        </div>
        <div class="flex justify-between mb-2">
          <span>Biaya Pengiriman</span>
          <span id="cart-delivery">Rp 0</span>
        </div>
        <div class="flex justify-between mb-2">
          <span>Pajak (10%)</span>
          <span id="cart-tax">Rp 0</span>
        </div>
        <div class="flex justify-between font-bold text-lg border-t pt-2">
          <span>Total</span>
          <span id="cart-total" class="text-feisty">Rp 0</span>
        </div>
        <button onclick="showCheckout()" class="w-full bg-feisty text-white py-3 rounded-lg font-bold mt-4 hover:bg-feisty-dark">
          Pesan Sekarang
        </button>
      </div>
    </div>
  </div>

  <!-- Checkout Modal -->
  <div id="checkout-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-lg w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <div class="p-4 border-b flex justify-between items-center">
        <h2 class="text-xl font-bold">Checkout</h2>
        <button onclick="closeCheckout()" class="text-gray-500 text-2xl">&times;</button>
      </div>
      
      <form id="checkout-form" class="p-4 space-y-4">
        <input type="hidden" id="checkout-lat">
        <input type="hidden" id="checkout-lng">
        
        <div>
          <label class="block text-sm font-medium mb-1">Nama Pelanggan</label>
          <input type="text" id="customer-name" required class="w-full px-4 py-2 border rounded-lg">
        </div>
        
        <div>
          <label class="block text-sm font-medium mb-1">No. WhatsApp</label>
          <input type="tel" id="customer-phone" required class="w-full px-4 py-2 border rounded-lg" placeholder="0812xxxxx">
        </div>
        
        <div>
          <label class="block text-sm font-medium mb-1">Alamat Lengkap</label>
          <textarea id="delivery-address" rows="2" required class="w-full px-4 py-2 border rounded-lg" placeholder="Jl. Contoh No. 1, Kota"></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Catatan (Opsional)</label>
          <textarea id="delivery-notes" rows="2" class="w-full px-4 py-2 border rounded-lg" placeholder="Contoh: Tanpa bawang, pedas sedang"></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Metode Pembayaran</label>
          <div class="grid grid-cols-3 gap-2">
            <label class="border rounded-lg p-3 cursor-pointer text-center hover:bg-orange-50">
              <input type="radio" name="payment" value="cash" class="hidden" checked>
              <div class="text-2xl mb-1">💵</div>
              <div class="text-sm">Tunai</div>
            </label>
            <label class="border rounded-lg p-3 cursor-pointer text-center hover:bg-orange-50">
              <input type="radio" name="payment" value="transfer" class="hidden">
              <div class="text-2xl mb-1">🏦</div>
              <div class="text-sm">Transfer</div>
            </label>
            <label class="border rounded-lg p-3 cursor-pointer text-center hover:bg-orange-50">
              <input type="radio" name="payment" value="qris" class="hidden">
              <div class="text-2xl mb-1">📱</div>
              <div class="text-sm">QRIS</div>
            </label>
          </div>
        </div>

        <div class="border-t pt-4">
          <div class="flex justify-between font-bold text-lg mb-4">
            <span>Total Pembayaran</span>
            <span id="checkout-total" class="text-feisty">Rp 0</span>
          </div>
        </div>

        <button type="submit" class="w-full bg-feisty text-white py-3 rounded-lg font-bold hover:bg-feisty-dark">
          Kirim Pesanan
        </button>
      </form>
    </div>
  </div>

  <!-- Success Modal -->
  <div id="success-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-lg p-6 text-center max-w-sm">
      <div class="text-5xl mb-4">✅</div>
      <h2 class="text-xl font-bold mb-2">Pesanan Diterima!</h2>
      <p class="text-gray-600 mb-4" id="success-message">Nomor pesanan Anda akan dikirim melalui WhatsApp.</p>
      <div class="bg-gray-100 rounded p-3 mb-4">
        <div class="text-sm text-gray-500">Nomor Pesanan</div>
        <div id="order-number" class="text-xl font-bold text-feisty">-</div>
      </div>
      <button onclick="closeSuccess()" class="w-full bg-feisty text-white py-2 rounded-lg font-bold">
        OK
      </button>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loading" class="fixed inset-0 bg-white bg-opacity-90 flex items-center justify-center z-50 hidden">
    <div class="text-center">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-feisty mx-auto mb-4"></div>
      <p class="text-gray-600">Mohon tunggu...</p>
    </div>
  </div>

  <script>
    // ============================================
    // STATE
    // ============================================
    let products = [];
    let categories = [];
    let cart = [];
    let outlets = [];
    let selectedOutlet = null;
    let userLocation = null;
    let deliveryFee = 0;
    let zones = [];

    // ============================================
    // INITIALIZATION
    // ============================================
    document.addEventListener('DOMContentLoaded', () => {
      loadOutlets();
    });

    // ============================================
    // DATA LOADING
    // ============================================
    async function loadOutlets() {
      try {
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/outlets?select=*&is_active=eq.true&is_open=eq.true&order=name`,
          { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
        );
        outlets = await response.json();
        
        // Load delivery zones
        await loadZones();
        
        // Detect location after loading outlets
        detectLocation();
      } catch (e) {
        console.error('Failed to load outlets:', e);
      }
    }

    async function loadZones() {
      try {
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/delivery_zones?select=*&is_active=eq.true`,
          { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
        );
        zones = await response.json();
      } catch (e) {
        console.error('Failed to load zones:', e);
        zones = [];
      }
    }

    async function loadProducts() {
      try {
        // Load all available products
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/products?select=*,categories:product_categories(name,slug)&is_available=eq.true&order=name`,
          { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
        );
        let allProducts = await response.json();
        
        // Filter products: show global products + products from selected outlet
        if (selectedOutlet) {
          products = allProducts.filter(p => 
            p.is_global === true || p.is_global === 'true' || 
            p.outlet_id === selectedOutlet.id || 
            !p.outlet_id
          );
        } else {
          // Show all products if no outlet selected
          products = allProducts;
        }
        
        renderCategories();
        renderProducts(products);
      } catch (e) {
        console.error('Failed to load products:', e);
        document.getElementById('products').innerHTML = '<p class="text-center text-gray-500 col-span-full">Gagal memuat produk</p>';
      }
    }

    // ============================================
    // LOCATION
    // ============================================
    function detectLocation() {
      document.getElementById('location-text').textContent = '📍 Mendeteksi lokasi...';
      
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            userLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };
            
            // Find nearest outlet and calculate delivery fee
            findNearestOutlet(position.coords.latitude, position.coords.longitude);
            
            document.getElementById('checkout-lat').value = position.coords.latitude;
            document.getElementById('checkout-lng').value = position.coords.longitude;
          },
          (error) => {
            console.error('Geolocation error:', error);
            document.getElementById('location-text').textContent = '📍 Lokasi tidak terdeteksi - akan menggunakan outlet terdekat';
            // Use first outlet as fallback
            if (outlets && outlets.length > 0) {
              selectOutlet(outlets[0]);
            }
            loadProducts();
          }
        );
      } else {
        document.getElementById('location-text').textContent = '📍 Geolocation tidak didukung';
        // Use first outlet as fallback
        if (outlets && outlets.length > 0) {
          selectOutlet(outlets[0]);
        }
        loadProducts();
      }
    }

    function findNearestOutlet(lat, lng) {
      if (!outlets || outlets.length === 0) {
        document.getElementById('location-text').textContent = '📍 Tidak ada outlet aktif';
        return;
      }

      // Check if user is in a delivery zone
      let nearestOutlet = null;
      let minDistance = Infinity;
      let foundZone = null;

      for (const outlet of outlets) {
        // Calculate distance to outlet
        const distance = calculateDistance(lat, lng, outlet.latitude, outlet.longitude);
        
        // Find zone that covers this location
        const zone = zones.find(z => 
          z.outlet_id === outlet.id && 
          calculateDistance(lat, lng, z.center_latitude, z.center_longitude) <= z.radius_km
        );
        
        if (zone && distance < minDistance) {
          minDistance = distance;
          nearestOutlet = outlet;
          foundZone = zone;
        }
      }

      if (nearestOutlet && foundZone) {
        selectOutlet(nearestOutlet, foundZone.delivery_fee);
      } else {
        // No zone found, use nearest outlet with default fee
        for (const outlet of outlets) {
          const distance = calculateDistance(lat, lng, outlet.latitude, outlet.longitude);
          if (distance < minDistance) {
            minDistance = distance;
            nearestOutlet = outlet;
          }
        }
        
        if (nearestOutlet) {
          // Check if within 10km of outlet
          if (minDistance <= 10) {
            selectOutlet(nearestOutlet, 5000); // Default 5km delivery fee
          } else {
            document.getElementById('location-text').textContent = '📍 Lokasi di luar jangkauan outlet';
            alert('Maaf, lokasi Anda terlalu jauh dari outlet terdekat (lebih dari 10km). Silakan pilih outlet lain atau hubungi kami.');
          }
        }
      }
    }

    function selectOutlet(outlet, fee = 5000) {
      selectedOutlet = outlet;
      deliveryFee = fee;
      
      document.getElementById('location-text').textContent = `📍 ${outlet.name} - ${formatCurrency(fee)} pengiriman`;
      
      // Reload products for this outlet
      loadProducts();
      
      // Update cart if open
      if (cart.length > 0) {
        updateCartUI();
      }
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
      // Haversine formula
      const R = 6371; // Earth's radius in km
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    function toRad(deg) {
      return deg * (Math.PI/180);
    }

    // ============================================
    // RENDER
    // ============================================
    function renderCategories() {
      // Extract unique categories
      const uniqueCategories = [];
      products.forEach(p => {
        if (p.categories && !uniqueCategories.find(c => c.id === p.categories.id)) {
          uniqueCategories.push(p.categories);
        }
      });
      
      const container = document.getElementById('categories');
      container.innerHTML = `
        <button onclick="filterCategory('all')" class="category-btn active px-4 py-2 rounded-full bg-gray-200 whitespace-nowrap text-sm font-medium">
          Semua
        </button>
        ${uniqueCategories.map(c => `
          <button onclick="filterCategory('${c.id}')" class="category-btn px-4 py-2 rounded-full bg-gray-200 whitespace-nowrap text-sm font-medium">
            ${c.name}
          </button>
        `).join('')}
      `;
    }

    function renderProducts(productsToRender) {
      const container = document.getElementById('products');
      
      if (!productsToRender || productsToRender.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-500 col-span-full">Belum ada produk tersedia</p>';
        return;
      }
      
      container.innerHTML = productsToRender.map(p => `
        <div class="product-card bg-white rounded-lg shadow-md overflow-hidden">
          <div class="h-32 bg-gray-100 flex items-center justify-center text-5xl">
            ${p.emoji || '🍔'}
          </div>
          <div class="p-3">
            <div class="font-medium text-sm mb-1">${p.name}</div>
            <div class="text-feisty font-bold">${formatCurrency(p.price)}</div>
            <button onclick="addToCart('${p.id}')" class="w-full mt-2 bg-feisty text-white py-1 rounded text-sm font-medium hover:bg-feisty-dark">
              + Tambah
            </button>
          </div>
        </div>
      `).join('');
    }

    function filterCategory(categoryId) {
      // Update active button
      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.classList.remove('active', 'bg-feisty', 'text-white');
        btn.classList.add('bg-gray-200');
      });
      event.target.classList.add('active', 'bg-feisty', 'text-white');
      event.target.classList.remove('bg-gray-200');
      
      // Filter products
      if (categoryId === 'all') {
        renderProducts(products);
      } else {
        const filtered = products.filter(p => p.category_id === categoryId);
        renderProducts(filtered);
      }
    }

    // ============================================
    // CART
    // ============================================
    function addToCart(productId) {
      const product = products.find(p => p.id === productId);
      if (!product) return;
      
      const existing = cart.find(item => item.product_id === productId);
      if (existing) {
        existing.quantity++;
      } else {
        cart.push({
          product_id: productId,
          name: product.name,
          price: product.price,
          quantity: 1
        });
      }
      
      updateCartUI();
      toggleCart(true);
    }

    function removeFromCart(productId) {
      cart = cart.filter(item => item.product_id !== productId);
      updateCartUI();
    }

    function updateQuantity(productId, delta) {
      const item = cart.find(i => i.product_id === productId);
      if (item) {
        item.quantity += delta;
        if (item.quantity <= 0) {
          removeFromCart(productId);
        } else {
          updateCartUI();
        }
      }
    }

    function updateCartUI() {
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);
      document.getElementById('cart-count').textContent = count;
      
      const container = document.getElementById('cart-items');
      const summary = document.getElementById('cart-summary');
      
      if (cart.length === 0) {
        container.innerHTML = '<p class="text-gray-500 text-center">Keranjang kosong</p>';
        summary.classList.add('hidden');
        return;
      }
      
      container.innerHTML = cart.map(item => `
        <div class="flex items-center gap-3 border-b pb-3">
          <div class="flex-1">
            <div class="font-medium text-sm">${item.name}</div>
            <div class="text-feisty text-sm">${formatCurrency(item.price)}</div>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="updateQuantity('${item.product_id}', -1)" class="w-8 h-8 rounded bg-gray-200">-</button>
            <span class="w-8 text-center">${item.quantity}</span>
            <button onclick="updateQuantity('${item.product_id}', 1)" class="w-8 h-8 rounded bg-feisty text-white">+</button>
          </div>
        </div>
      `).join('');
      
      // Calculate totals
      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const tax = Math.round(subtotal * 0.1);
      const total = subtotal + deliveryFee + tax;
      
      document.getElementById('cart-subtotal').textContent = formatCurrency(subtotal);
      document.getElementById('cart-delivery').textContent = formatCurrency(deliveryFee);
      document.getElementById('cart-tax').textContent = formatCurrency(tax);
      document.getElementById('cart-total').textContent = formatCurrency(total);
      document.getElementById('checkout-total').textContent = formatCurrency(total);
      
      summary.classList.remove('hidden');
    }

    function toggleCart(forceOpen = false) {
      const sidebar = document.getElementById('cart-sidebar');
      if (forceOpen || sidebar.classList.contains('translate-x-full')) {
        sidebar.classList.remove('translate-x-full');
      } else {
        sidebar.classList.add('translate-x-full');
      }
    }

    // ============================================
    // CHECKOUT
    // ============================================
    function showCheckout() {
      if (cart.length === 0) {
        alert('Keranjang kosong!');
        return;
      }
      document.getElementById('checkout-modal').classList.remove('hidden');
      document.getElementById('checkout-modal').classList.add('flex');
      toggleCart();
    }

    function closeCheckout() {
      document.getElementById('checkout-modal').classList.add('hidden');
      document.getElementById('checkout-modal').classList.remove('flex');
    }

    document.getElementById('checkout-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const loading = document.getElementById('loading');
      loading.classList.remove('hidden');
      
      const orderData = {
        items: cart.map(item => ({
          product_id: item.product_id,
          quantity: item.quantity
        })),
        customer_name: document.getElementById('customer-name').value,
        customer_phone: document.getElementById('customer-phone').value,
        delivery_address: document.getElementById('delivery-address').value,
        delivery_latitude: parseFloat(document.getElementById('checkout-lat').value) || 0,
        delivery_longitude: parseFloat(document.getElementById('checkout-lng').value) || 0,
        delivery_instructions: document.getElementById('delivery-notes').value,
        payment_method: document.querySelector('input[name="payment"]:checked').value
      };
      
      try {
        const response = await fetch(`${SUPABASE_URL}/functions/v1/weborder`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify(orderData)
        });
        
        const result = await response.json();
        
        loading.classList.add('hidden');
        
        if (result.success) {
          document.getElementById('order-number').textContent = result.data.order_number;
          document.getElementById('success-message').textContent = result.data.message;
          document.getElementById('checkout-modal').classList.add('hidden');
          document.getElementById('success-modal').classList.remove('hidden');
          document.getElementById('success-modal').classList.add('flex');
          
          // Clear cart
          cart = [];
          updateCartUI();
        } else {
          alert(result.error?.message || 'Gagal membuat pesanan');
        }
      } catch (error) {
        loading.classList.add('hidden');
        console.error('Order error:', error);
        alert('Terjadi kesalahan. Silakan coba lagi.');
      }
    });

    function closeSuccess() {
      document.getElementById('success-modal').classList.add('hidden');
      document.getElementById('success-modal').classList.remove('flex');
      window.location.reload();
    }

    // ============================================
    // OUTLET SELECTOR
    // ============================================
    function showOutletSelector() {
      const container = document.getElementById('outlet-list');
      
      if (!outlets || outlets.length === 0) {
        container.innerHTML = '<p class="text-gray-500 text-center">Tidak ada outlet tersedia</p>';
      } else {
        container.innerHTML = outlets.map(o => `
          <button onclick="selectOutletById('${o.id}')" class="w-full p-3 border rounded-lg text-left hover:bg-orange-50 ${selectedOutlet?.id === o.id ? 'border-feisty bg-orange-50' : ''}">
            <div class="font-medium">${o.name}</div>
            <div class="text-sm text-gray-500">${o.address || 'Alamat tidak tersedia'}</div>
            ${o.opening_time && o.closing_time ? `<div class="text-sm text-gray-500">Buka: ${o.opening_time} - ${o.closing_time}</div>` : ''}
          </button>
        `).join('');
      }
      
      document.getElementById('outlet-modal').classList.remove('hidden');
      document.getElementById('outlet-modal').classList.add('flex');
    }

    function closeOutletModal() {
      document.getElementById('outlet-modal').classList.add('hidden');
      document.getElementById('outlet-modal').classList.remove('flex');
    }

    function selectOutletById(outletId) {
      const outlet = outlets.find(o => o.id === outletId);
      if (outlet) {
        selectOutlet(outlet, 5000); // Default fee when manually selected
        closeOutletModal();
      }
    }

    // ============================================
    // UTILITIES
    // ============================================
    function formatCurrency(amount) {
      return 'Rp ' + Math.round(amount || 0).toLocaleString('id-ID');
    }
  </script>
</body>
</html>
