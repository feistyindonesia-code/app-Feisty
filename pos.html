<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POS System - Feisty</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #fc7303;
        --primary-dark: #e65a00;
        --background: #ffffff;
        --text: #333;
        --header-bg: #fc7303;
        --header-text: white;
        --border: #ddd;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: var(--background);
        color: var(--text);
      }

      header {
        background: var(--header-bg);
        padding: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        color: var(--header-text);
      }

      .logo {
        font-size: 1.5em;
        font-weight: bold;
        color: var(--header-text);
      }

      .user-info {
        font-size: 0.9em;
        text-align: right;
      }

      main {
        display: grid;
        grid-template-columns: 1fr 400px;
        height: calc(100vh - 70px);
      }

      .products-section {
        display: flex;
        flex-direction: column;
        padding: 20px;
        background: var(--background);
      }

      .search-box {
        margin-bottom: 20px;
      }

      .search-box input {
        width: 100%;
        padding: 10px 16px;
        border: 2px solid var(--border);
        border-radius: 8px;
        background: #fff;
        color: var(--text);
        font-size: 1em;
      }

      .search-box input::placeholder {
        color: #999;
      }

      .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 12px;
        flex: 1;
        overflow-y: auto;
      }

      .product-btn {
        padding: 16px 10px;
        background: var(--primary);
        border: none;
        border-radius: 8px;
        color: white;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      .product-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 12px rgba(252, 115, 3, 0.4);
      }

      .product-btn .emoji {
        font-size: 2em;
      }

      .product-btn .name {
        font-size: 0.8em;
        text-align: center;
      }

      .product-btn .price {
        font-size: 0.75em;
        opacity: 0.8;
      }

      .order-section {
        background: #f9f9f9;
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
      }

      .section-title {
        padding: 16px;
        border-bottom: 1px solid #333;
        font-weight: 700;
        font-size: 1.1em;
      }

      .order-items {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }

      .order-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid #333;
        font-size: 0.9em;
      }

      .order-item-info {
        flex: 1;
      }

      .order-item-name {
        font-weight: 600;
      }

      .order-item-qty-controller {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .qty-btn {
        width: 24px;
        height: 24px;
        border: 1px solid var(--primary);
        background: transparent;
        color: var(--primary);
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
      }

      .order-item-price {
        color: var(--primary);
        font-weight: 600;
        text-align: right;
        min-width: 80px;
      }

      .order-summary {
        padding: 16px;
        border-top: 1px solid #333;
      }

      .summary-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        font-size: 0.9em;
      }

      .summary-row.total {
        font-size: 1.2em;
        font-weight: 700;
        color: var(--primary);
        border-top: 2px solid var(--border);
        padding-top: 8px;
        margin-top: 8px;
      }

      .action-buttons {
        display: flex;
        gap: 8px;
        padding: 16px;
        border-top: 1px solid #333;
      }

      .btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-clear {
        background: #d32f2f;
        color: white;
      }

      .btn-clear:hover {
        background: #c62828;
      }

      .btn-pay {
        background: var(--primary);
        color: white;
      }

      .btn-pay:hover {
        transform: scale(1.02);
      }

      .empty-state {
        text-align: center;
        color: #999;
        padding: 20px;
      }

      @media (max-width: 1024px) {
        main {
          grid-template-columns: 1fr;
        }

        .order-section {
          border-left: none;
          border-top: 1px solid #333;
          max-height: 50%;
        }
      }

      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #f0f0f0;
      }

      ::-webkit-scrollbar-thumb {
        background: var(--primary);
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">🏪 Feisty POS</div>
      <div class="user-info">
        <div>Operator: <strong>Tukang</strong></div>
        <div id="time"></div>
      </div>
    </header>

    <main>
      <div class="products-section">
        <div class="search-box">
          <input
            type="text"
            id="search"
            placeholder="🔍 Cari produk..."
            onkeyup="filterProducts()"
          />
        </div>
        <div class="products-grid" id="products-grid">
          <!-- Products will be loaded here -->
        </div>
      </div>

      <div class="order-section">
        <div class="section-title">
          📋 Order (<span id="item-count">0</span>)
        </div>

        <div class="order-items" id="order-items">
          <div class="empty-state">Belum ada pesanan</div>
        </div>

        <div class="order-summary">
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">Rp 0</span>
          </div>
          <div class="summary-row">
            <span>Tax (10%)</span>
            <span id="tax">Rp 0</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span id="total">Rp 0</span>
          </div>
        </div>

        <div class="action-buttons">
          <button class="btn btn-clear" onclick="clearOrder()">Batal</button>
          <button class="btn btn-pay" onclick="completeOrder()">Bayar</button>
        </div>
      </div>
    </main>

    <script>
      // Mock product data
      const products = [
        {
          id: "1",
          name: "Burger Spesial",
          price: 45000,
          emoji: "🍔",
        },
        { id: "2", name: "Nasi Goreng", price: 35000, emoji: "🍚" },
        { id: "3", name: "Iced Coffee", price: 25000, emoji: "☕" },
        {
          id: "4",
          name: "Smoothie Mangga",
          price: 28000,
          emoji: "🥤",
        },
        { id: "5", name: "Tiramisu", price: 32000, emoji: "🍰" },
        { id: "6", name: "Sate Ayam", price: 40000, emoji: "🍗" },
        { id: "7", name: "Mie Bihun", price: 30000, emoji: "🍝" },
        { id: "8", name: "Es Cendol", price: 15000, emoji: "🧊" },
      ];

      let order = {};

      function renderProducts() {
        const grid = document.getElementById("products-grid");
        grid.innerHTML = products
          .map(
            (p) => `
          <button class="product-btn" onclick="addItem('${p.id}')">
            <div class="emoji">${p.emoji}</div>
            <div class="name">${p.name}</div>
            <div class="price">Rp ${(p.price / 1000).toFixed(0)}K</div>
          </button>
        `
          )
          .join("");
      }

      function addItem(productId) {
        const product = products.find((p) => p.id === productId);
        if (!product) return;

        if (order[productId]) {
          order[productId].quantity++;
        } else {
          order[productId] = {
            ...product,
            quantity: 1,
          };
        }

        updateOrder();
      }

      function updateQuantity(productId, change) {
        if (order[productId]) {
          order[productId].quantity += change;
          if (order[productId].quantity <= 0) {
            delete order[productId];
          }
          updateOrder();
        }
      }

      function updateOrder() {
        const items = Object.values(order);
        const itemsContainer = document.getElementById("order-items");

        if (items.length === 0) {
          itemsContainer.innerHTML =
            '<div class="empty-state">Belum ada pesanan</div>';
          document.getElementById("item-count").textContent = "0";
          document.getElementById("subtotal").textContent = "Rp 0";
          document.getElementById("tax").textContent = "Rp 0";
          document.getElementById("total").textContent = "Rp 0";
          return;
        }

        itemsContainer.innerHTML = items
          .map(
            (item) => `
          <div class="order-item">
            <div class="order-item-info">
              <div class="order-item-name">${item.name}</div>
              <div class="order-item-qty-controller">
                <button class="qty-btn" onclick="updateQuantity('${item.id}', -1)">-</button>
                <span style="min-width: 20px; text-align: center;">${item.quantity}</span>
                <button class="qty-btn" onclick="updateQuantity('${item.id}', 1)">+</button>
              </div>
            </div>
            <div class="order-item-price">
              Rp ${(item.price * item.quantity).toLocaleString()}
            </div>
          </div>
        `
          )
          .join("");

        const subtotal = items.reduce(
          (sum, item) => sum + item.price * item.quantity,
          0
        );
        const tax = Math.round(subtotal * 0.1);
        const total = subtotal + tax;

        document.getElementById("item-count").textContent = items.length;
        document.getElementById("subtotal").textContent = `Rp ${subtotal.toLocaleString()}`;
        document.getElementById("tax").textContent = `Rp ${tax.toLocaleString()}`;
        document.getElementById("total").textContent = `Rp ${total.toLocaleString()}`;
      }

      function clearOrder() {
        if (confirm("Batal pesanan?")) {
          order = {};
          updateOrder();
        }
      }

      function completeOrder() {
        const items = Object.values(order);
        if (items.length === 0) {
          alert("Tidak ada pesanan!");
          return;
        }

        alert("Pembayaran berhasil! Order tersimpan.");
        order = {};
        updateOrder();
      }

      function filterProducts() {
        const searchTerm = document
          .getElementById("search")
          .value.toLowerCase();
        // Implement filter logic
      }

      // Update time
      function updateTime() {
        const now = new Date().toLocaleTimeString("id-ID", {
          hour: "2-digit",
          minute: "2-digit",
        });
        document.getElementById("time").textContent = now;
      }

      setInterval(updateTime, 1000);
      updateTime();

      // Initial render
      renderProducts();
    </script>
  </body>
</html>
