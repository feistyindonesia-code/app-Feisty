name: Deploy Feisty V2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Verify checkout
        run: |
          echo "=== POST-CHECKOUT DIAGNOSTICS ==="
          echo "Current directory: $(pwd)"
          echo "Git HEAD: $(git rev-parse HEAD)"
          echo "Git branch: $(git rev-parse --abbrev-ref HEAD)"
          echo ""
          echo "Working directory contents:"
          ls -la
          echo ""
          echo "Checking supabase directory:"
          if [ -d supabase ]; then
            echo "✓ supabase/ exists"
            ls -la supabase/
          else
            echo "✗ supabase/ NOT FOUND - attempting restore"
            git checkout HEAD -- supabase/ 2>&1 || true
            if [ -d supabase ]; then
              echo "✓ Successfully restored"
              ls -la supabase/
            else
              echo "✗ Restore FAILED"
            fi
          fi
          echo ""
          echo "Git tracked files in supabase/ (from HEAD tree):"
          git ls-tree -r HEAD supabase/ | head -20

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4
        with:
          branch: gh-pages
          folder: /

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ] || [ -f yarn.lock ]; then
            npm ci --no-audit --no-fund --no-optional
          else
            npm install --no-audit --no-fund --no-optional
          fi

      - name: Install Supabase CLI
        run: |
          set -e
          echo "Installing Supabase CLI via GitHub releases"
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ] || [ "$ARCH" = "amd64" ]; then
            ASSET="linux_amd64"
          elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            ASSET="linux_arm64"
          else
            ASSET="linux_amd64"
          fi
          URL="https://github.com/supabase/cli/releases/latest/download/supabase_${ASSET}.tar.gz"
          echo "Downloading $URL"
          curl -sSL -L "$URL" -o supabase.tar.gz
          if ! file supabase.tar.gz | grep -q "gzip\|tar"; then
            echo "Downloaded file is not a valid tar.gz. Content:"
            file supabase.tar.gz
            head -c 100 supabase.tar.gz
            exit 1
          fi
          rm -rf supabase
          tar -xzf supabase.tar.gz
          chmod +x supabase
          sudo mv supabase /usr/local/bin/
          rm -f supabase.tar.gz
          supabase --version

      - name: Supabase login
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "SUPABASE_ACCESS_TOKEN secret is not set" >&2
            exit 1
          fi
          supabase login --token ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Link Supabase project
        run: |
          supabase link --project-ref ${{ env.SUPABASE_PROJECT_REF }} \
            --password ${{ env.SUPABASE_DB_PASSWORD }}

      - name: Debug migrations
        run: |
          echo "Current directory: $(pwd)"
          echo "Listing root directory:"
          ls -la
          echo ""
          echo "Checking supabase directory:"
          if [ -d supabase ]; then
            echo "supabase/ exists - listing contents:"
            ls -la supabase/
            if [ -d supabase/migrations ]; then
              echo "supabase/migrations/ exists - listing contents:"
              ls -la supabase/migrations/
            else
              echo "ERROR: supabase/migrations/ does NOT exist"
            fi
          else
            echo "ERROR: supabase/ directory does NOT exist"
          fi
          echo ""
          echo "Supabase config:"
          if [ -f supabase/config.json ]; then
            cat supabase/config.json
          fi

      - name: Reset migration history
        run: |
          echo "Resetting remote migration history to match local..."
          supabase migration repair --status reverted 001 002 003 004 || echo "Repair command not needed or failed (OK)"

      - name: Push database migrations
        run: |
          echo "Current directory: $(pwd)"
          echo "Pushing migrations with verbose output..."
          supabase db push --dry-run || true
          echo ""
          echo "Performing actual push..."
          supabase db push

      - name: Pre-deployment file check
        run: |
          echo "=== PRE-DEPLOYMENT FILE CHECK ==="
          echo "Current working directory: $(pwd)"
          echo ""
          echo "Root directory contents:"
          ls -la
          echo ""
          if [ -d supabase ]; then
            echo "✓ supabase/ exists"
            echo "  Contents:"
            ls -la supabase/
            if [ -d supabase/functions ]; then
              echo "✓ supabase/functions/ exists"
              ls -la supabase/functions/
            else
              echo "✗ supabase/functions/ MISSING!"
            fi
          else
            echo "✗ supabase/ directory MISSING!"
            echo "Attempting aggressive restoration..."
            git status
            git log --oneline -1
            git ls-files supabase/ | head
          fi

      - name: Deploy Edge Functions
        run: |
          echo "Checking project structure..."
          pwd
          echo "Listing top-level contents:"
          ls -la
          echo "Recursive listing (for debugging):"
          ls -R | head -100

          if [ -d "supabase/functions" ]; then
            echo "Supabase functions directory found."
            # make sure there are actual .ts files inside any subdirectory
            if compgen -G "supabase/functions/*/*.ts" > /dev/null; then
              echo "Function files detected. Deploying..."
            else
              echo "No .ts function files found under supabase/functions. Skipping deployment."
              exit 0
            fi
          else
            echo "No supabase/functions directory found. Skipping deployment."
            exit 0
          fi

          # Deploy each function in a safe loop
          for fn in whatsapp-webhook ai-dispatcher create-order update-order-status create-payment notify-outlet notify-customer; do
            echo "Deploying $fn..."
            supabase functions deploy "$fn" --project-ref ${{ env.SUPABASE_PROJECT_REF }} --no-verify-jwt
          done
          supabase functions deploy create-payment --project-ref ${{ env.SUPABASE_PROJECT_REF }} --no-verify-jwt
          supabase functions deploy notify-outlet --project-ref ${{ env.SUPABASE_PROJECT_REF }} --no-verify-jwt
          supabase functions deploy notify-customer --project-ref ${{ env.SUPABASE_PROJECT_REF }} --no-verify-jwt

      - name: Prepare landing page for deploy
        run: |
          echo "Copying root index.html into frontend/ (GH Pages only sees that folder)"
          cp index.html frontend/index.html || true

      - name: Deploy frontend to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend
          publish_branch: gh-pages
          keep_files: false

      - name: Deployment Summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Frontend (gh-pages): https://${{ github.repository_owner }}.github.io/feisty-app"
          echo "☁️ Backend: Supabase project ${{ env.SUPABASE_PROJECT_REF }}"
          echo "📦 Migrations: Deployed"
          echo "⚡ Edge Functions: Deployed"

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Send Slack notification
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Feisty V2 Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Status:* ${{ job.status }}\n*Commit*: ${{ github.sha }}\n*Branch*: ${{ github.ref }}"
                  }
                }
              ]
            }
