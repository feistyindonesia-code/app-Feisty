name: Deploy Feisty V2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ] || [ -f yarn.lock ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Link Supabase project
        run: |
          supabase link --project-ref ${{ env.SUPABASE_PROJECT_REF }} \
            --password ${{ env.SUPABASE_DB_PASSWORD }}

      - name: Push database migrations
        run: supabase db push

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy whatsapp-webhook --project-ref ${{ env.SUPABASE_PROJECT_REF }}
          supabase functions deploy ai-dispatcher --project-ref ${{ env.SUPABASE_PROJECT_REF }}
          supabase functions deploy create-order --project-ref ${{ env.SUPABASE_PROJECT_REF }}
          supabase functions deploy update-order-status --project-ref ${{ env.SUPABASE_PROJECT_REF }}
          supabase functions deploy create-payment --project-ref ${{ env.SUPABASE_PROJECT_REF }}
          supabase functions deploy notify-outlet --project-ref ${{ env.SUPABASE_PROJECT_REF }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "frontend"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3

      - name: Deployment Summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Frontend: https://${{ github.repository_owner }}.github.io/feisty-app"
          echo "☁️ Backend: Supabase project ${{ env.SUPABASE_PROJECT_REF }}"
          echo "📦 Migrations: Deployed"
          echo "⚡ Edge Functions: Deployed"

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Send Slack notification
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Feisty V2 Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Status:* ${{ job.status }}\n*Commit*: ${{ github.sha }}\n*Branch*: ${{ github.ref }}"
                  }
                }
              ]
            }
