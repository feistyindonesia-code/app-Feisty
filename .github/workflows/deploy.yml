name: Deploy Feisty V2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify checkout
        run: |
          echo "=== POST-CHECKOUT DIAGNOSTICS ==="
          echo "Current directory: $(pwd)"
          echo "Working directory contents:"
          ls -la
          echo ""
          echo "Git status:"
          git status --short
          echo ""
          echo "Checking supabase directory:"
          if [ -d supabase ]; then
            echo "✓ supabase/ exists"
            ls -la supabase/
          else
            echo "✗ supabase/ NOT FOUND"
          fi
          echo ""
          echo "Git tracked files in supabase/ (from tree):"
          git ls-tree -r HEAD supabase/
          echo ""
          echo "GIT LS-FILES in supabase/:"
          git ls-files supabase/
          echo ""
          echo "Checking git status of supabase/:"
          git status supabase/
          echo ""
          echo "If supabase directory missing, restoring from HEAD:"
          if [ ! -d supabase ]; then
            echo "Restoring supabase/ from git..."
            git checkout HEAD -- supabase/
            echo "After restore:"
            ls -la supabase/
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ] || [ -f yarn.lock ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Install Supabase CLI
        run: |
          set -e
          echo "Installing Supabase CLI via GitHub releases"
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ] || [ "$ARCH" = "amd64" ]; then
            ASSET="linux_amd64"
          elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            ASSET="linux_arm64"
          else
            ASSET="linux_amd64"
          fi
          URL="https://github.com/supabase/cli/releases/latest/download/supabase_${ASSET}.tar.gz"
          echo "Downloading $URL"
          curl -sSL -L "$URL" -o supabase.tar.gz
          if ! file supabase.tar.gz | grep -q "gzip\|tar"; then
            echo "Downloaded file is not a valid tar.gz. Content:"
            file supabase.tar.gz
            head -c 100 supabase.tar.gz
            exit 1
          fi
          rm -rf supabase
          tar -xzf supabase.tar.gz
          chmod +x supabase
          sudo mv supabase /usr/local/bin/
          rm -f supabase.tar.gz
          supabase --version

      - name: Supabase login
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "SUPABASE_ACCESS_TOKEN secret is not set" >&2
            exit 1
          fi
          supabase login --token ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Link Supabase project
        run: |
          supabase link --project-ref ${{ env.SUPABASE_PROJECT_REF }} \
            --password ${{ env.SUPABASE_DB_PASSWORD }}

      - name: Debug migrations
        run: |
          echo "Current directory: $(pwd)"
          echo "Listing root directory:"
          ls -la
          echo ""
          echo "Checking supabase directory:"
          if [ -d supabase ]; then
            echo "supabase/ exists - listing contents:"
            ls -la supabase/
            if [ -d supabase/migrations ]; then
              echo "supabase/migrations/ exists - listing contents:"
              ls -la supabase/migrations/
            else
              echo "ERROR: supabase/migrations/ does NOT exist"
            fi
          else
            echo "ERROR: supabase/ directory does NOT exist"
          fi
          echo ""
          echo "Supabase config:"
          if [ -f supabase/config.json ]; then
            cat supabase/config.json
          fi

      - name: Reset migration history
        run: |
          echo "Resetting remote migration history to match local..."
          supabase migration repair --status reverted 001 002 003 004 || echo "Repair command not needed or failed (OK)"

      - name: Push database migrations
        run: |
          echo "Current directory: $(pwd)"
          echo "Pushing migrations with verbose output..."
          supabase db push --dry-run || true
          echo ""
          echo "Performing actual push..."
          supabase db push

      - name: Deploy Edge Functions
        run: |
          echo "Checking function files before deployment..."
          if [ -d supabase/functions ]; then
            echo "supabase/functions/ exists"
            ls -la supabase/functions/
            echo ""
            for func_dir in supabase/functions/*/; do
              func_name=$(basename "$func_dir")
              if [ -f "$func_dir/index.ts" ]; then
                echo "✓ $func_name/index.ts exists"
              else
                echo "✗ $func_name/index.ts NOT FOUND"
                ls -la "$func_dir" || echo "Directory not accessible"
              fi
            done
            echo ""
            echo "Deploying functions..."
          else
            echo "ERROR: supabase/functions/ directory not found!"
            exit 1
          fi
          supabase functions deploy whatsapp-webhook --project-ref ${{ env.SUPABASE_PROJECT_REF }}
          supabase functions deploy ai-dispatcher --project-ref ${{ env.SUPABASE_PROJECT_REF }}
          supabase functions deploy create-order --project-ref ${{ env.SUPABASE_PROJECT_REF }}
          supabase functions deploy update-order-status --project-ref ${{ env.SUPABASE_PROJECT_REF }}
          supabase functions deploy create-payment --project-ref ${{ env.SUPABASE_PROJECT_REF }}
          supabase functions deploy notify-outlet --project-ref ${{ env.SUPABASE_PROJECT_REF }}

      - name: Deploy frontend to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend
          publish_branch: gh-pages
          keep_files: false

      - name: Deployment Summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Frontend (gh-pages): https://${{ github.repository_owner }}.github.io/feisty-app"
          echo "☁️ Backend: Supabase project ${{ env.SUPABASE_PROJECT_REF }}"
          echo "📦 Migrations: Deployed"
          echo "⚡ Edge Functions: Deployed"

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Send Slack notification
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Feisty V2 Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Status:* ${{ job.status }}\n*Commit*: ${{ github.sha }}\n*Branch*: ${{ github.ref }}"
                  }
                }
              ]
            }
